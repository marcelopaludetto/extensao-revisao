<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <style>
    /* ── Cascadia Code palette ────────────────────────────────────
       Primary:   #50DEFF  (cyan)
       Blue:      #3D6CE2
       Purple:    #9761FF
       Green:     #56A145
       Orange:    #F79722
       Red:       #CA3328
    ──────────────────────────────────────────────────────────── */

    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cascadia Code', 'Cascadia Mono', 'Fira Code', 'Consolas', monospace;
      width: 320px;
      background: #f0f4f8;
      color: #0d1117;
    }

    .popup-header {
      background: #0d1117;
      padding: 14px 16px;
      border-bottom: 2px solid #50DEFF;
    }

    .popup-header span {
      color: #f0f4f8;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .popup-header span em {
      color: #50DEFF;
      font-style: normal;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      background: #e6edf3;
      border-bottom: 1px solid #d0d7de;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: #57606a;
      cursor: pointer;
      border-radius: 0;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      width: auto;
    }

    .tab.active {
      color: #0d1117;
      border-bottom: 2px solid #50DEFF;
      background: transparent;
    }

    .tab:hover:not(.active) {
      background: #d8e3ee;
    }

    .popup-body {
      padding: 16px;
    }

    button {
      width: 100%;
      padding: 11px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
    }

    #start {
      background: #50DEFF;
      color: #0d1117;
    }

    #start:hover {
      background: #29c9f0;
    }

    .hint {
      margin-top: 8px;
      color: #57606a;
      font-size: 12px;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      color: #444d56;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9761FF;
      margin-bottom: 10px;
      margin-top: 16px;
    }

    .section-label:first-child {
      margin-top: 0;
    }

    hr.divider {
      border: none;
      border-top: 1px solid #d0d7de;
      margin: 16px 0;
    }

    #history {
      margin-top: 14px;
    }

    .hist-title {
      font-weight: 700;
      font-size: 12px;
      color: #0d1117;
      margin-bottom: 4px;
    }

    .hist-item {
      font-size: 11px;
      padding: 6px 0;
      border-bottom: 1px solid #d0d7de;
      color: #444d56;
    }

    .hist-item:last-child {
      border-bottom: none;
    }

    .hist-id {
      font-weight: 700;
    }

    .hist-ok {
      color: #56A145;
      font-weight: 600;
    }

    .hist-report {
      background: none;
      border: none;
      color: #3D6CE2;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      font-size: 11px;
      width: auto;
      font-family: inherit;
    }

    /* Inputs genéricos */
    input[type="text"],
    input[type="password"],
    textarea {
      display: block;
      width: 100%;
      padding: 9px 12px;
      font-size: 12px;
      border: 1.5px solid #d0d7de;
      border-radius: 8px;
      margin-bottom: 8px;
      font-family: inherit;
      color: #0d1117;
      background: #fff;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      border-color: #50DEFF;
      box-shadow: 0 0 0 2px rgba(80,222,255,0.18);
    }

    /* Auditoria em lote */
    #batch-ids {
      resize: vertical;
      min-height: 60px;
    }

    #batch-audit-btn {
      background: #0d1117;
      color: #50DEFF;
      font-weight: 600;
      border: 1.5px solid #50DEFF;
    }

    #batch-audit-btn:hover {
      background: #161b22;
    }

    #batch-status {
      margin-top: 8px;
      font-size: 12px;
      color: #444d56;
    }

    /* Token GitHub */
    #github-token-save-btn {
      background: #fff;
      color: #0d1117;
      border: 1.5px solid #d0d7de;
      font-weight: 500;
    }

    #github-token-save-btn:hover {
      background: #e6edf3;
    }

    #github-token-status {
      margin-top: 8px;
      font-size: 12px;
      color: #444d56;
    }

    /* Em breve */
    .soon-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .soon-item {
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #9761FF;
      background: #f6f2ff;
      border: 1.5px dashed #c9b8ff;
      position: relative;
      padding-right: 72px;
      opacity: 0.7;
    }

    .soon-item::after {
      content: "Em breve";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      font-weight: 700;
      color: #9761FF;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .update-banner {
      display: none;
      background: #fff8e1;
      border-bottom: 2px solid #F79722;
      padding: 8px 12px;
      font-size: 12px;
      color: #b35900;
      flex-direction: column;
      gap: 6px;
    }

    .update-banner.visible {
      display: flex;
    }

    .update-banner span {
      line-height: 1.4;
    }

    .update-banner button {
      background: #F79722;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      align-self: flex-start;
    }

    footer a {
      color: #3D6CE2 !important;
    }
  </style>
</head>

<body>
  <div class="popup-header">
    <span>Start <em>Revisor</em></span>
  </div>
  <div class="update-banner" id="update-banner">
    <span id="update-banner-text">Nova versão disponível!</span>
    <span style="font-size:11px;color:#bf360c;">Extraia o ZIP na pasta da extensão e clique em Recarregar no
      Chrome.</span>
    <button id="btn-baixar-atualizacao">Baixar atualização</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-review-btn">Revisão</button>
    <button class="tab" id="tab-tools-btn">Ferramentas</button>
  </div>
  <div class="popup-body">

    <!-- ABA: Revisão -->
    <div id="tab-review">
      <div id="product-type-selector" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="radio"
            name="productType" value="tecnico" checked> Curso Técnico</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="radio"
            name="productType" value="efaf"> EFAF</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="radio"
            name="productType" value="em"> EM</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;"><input type="radio"
            name="productType" value="efai"> EFAI</label>
      </div>
      <button id="start">Start revisão</button>
      <div class="hint">Abra a Home do curso e clique no botão desejado.</div>
      <div id="status" class="status"></div>
      <div id="history"></div>
    </div>

    <!-- ABA: Ferramentas -->
    <div id="tab-tools" style="display:none">

      <div class="section-label">Token GitHub</div>
      <input id="github-token" type="password" placeholder="Cole o Personal Access Token aqui" autocomplete="off">
      <button id="github-token-save-btn">Salvar token</button>
      <div id="github-token-status"></div>

      <hr class="divider">

      <div class="section-label">Auditoria de transcrições e legendagens</div>
      <textarea id="batch-ids" placeholder="1678, 2262, 2667, 4319, ..."></textarea>
      <div style="display:flex;flex-direction:column;gap:6px;margin:8px 0 8px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="audit-transcription" checked> Transcrição
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="audit-pt"> Legendas em PT
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="audit-esp"> Legendas em ESP
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="audit-download-textual"> Download textual
        </label>
      </div>
      <button id="batch-audit-btn">Auditar lista</button>
      <div id="batch-status"></div>

      <hr class="divider">

      <div class="section-label">Upload ícone Start</div>
      <div class="hint" style="margin-bottom:8px;margin-top:0">Abra a Home do curso Start antes de usar.</div>
      <button id="start-icon-btn" style="background:#F79722; color:#0d1117; font-weight:600;">Upload ícone Start</button>
      <div id="start-icon-status" style="margin-top:6px;font-size:12px;color:#444d56;white-space:pre-wrap;"></div>

      <hr class="divider">


    </div>

  </div>
  <footer style="text-align:center;padding:10px 16px;border-top:1px solid #d0d7de;background:#e6edf3;">
  </footer>
  <script src="popup.js"></script>
</body>

</html>
